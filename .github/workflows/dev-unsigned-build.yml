name: Dev Build for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, fix_build ]

env:
  BAZEL_USER_ROOT: "/private/var/tmp/_bazel_containerhost"

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Bazel cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BAZEL_USER_ROOT }}
          key: ${{ runner.os }}-bazel-device-cache

      - name: Build IPA for Real Device (Sideloadly)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$((COMMIT_COUNT+BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          # Use example configuration with dummy profiles
          rm -rf $HOME/telegram-configuration
          mkdir -p $HOME/telegram-configuration
          
          # Use test-release config as base
          cp build-system/test-release-configuration.json $HOME/telegram-configuration/dev-config.json
          
          # Override API credentials if provided
          if [ ! -z "$API_ID" ]; then
            sed -i '' "s/\"api_id\": \"[^\"]*\"/\"api_id\": \"$API_ID\"/g" $HOME/telegram-configuration/dev-config.json
          fi
          if [ ! -z "$API_HASH" ]; then
            sed -i '' "s/\"api_hash\": \"[^\"]*\"/\"api_hash\": \"$API_HASH\"/g" $HOME/telegram-configuration/dev-config.json
          fi

          # Create fresh dummy provisioning profiles (will be re-signed by Sideloadly)
          mkdir -p $HOME/telegram-configuration/provisioning/profiles
          mkdir -p $HOME/telegram-configuration/provisioning/certs
          python3 build-system/Make/create_dummy_profiles.py "DUMMY" "org.telegram.messenger" "$HOME/telegram-configuration/provisioning/profiles"
          echo "✅ Generated fresh dummy codesigning profiles"

          # Build for REAL DEVICE (arm64)
          echo "🔨 Building for iOS device (arm64)..."
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="$HOME/telegram-configuration/dev-config.json" \
            --codesigningInformationPath="$HOME/telegram-configuration/provisioning" \
            --buildNumber=$BUILD_NUMBER \
            --configuration=release_arm64

          echo "✅ Build completed successfully!"

          # Collect artifacts
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          
          # Find and copy the IPA
          echo "📦 Collecting IPA..."
          if [ -f "bazel-bin/Telegram/Telegram.ipa" ]; then
            cp "bazel-bin/Telegram/Telegram.ipa" "$OUTPUT_PATH/Vartagram-Sideloadly-${BUILD_NUMBER}.ipa"
            echo "✅ IPA ready: Vartagram-Sideloadly-${BUILD_NUMBER}.ipa"
            ls -lh "$OUTPUT_PATH/"
          else
            echo "❌ IPA not found in expected location"
            echo "Searching for IPA files..."
            find bazel-bin -name "*.ipa" -type f
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-Sideloadly-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/*.ipa
          retention-days: 30

      - name: Create GitHub Release with IPA
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: sideloadly-build-${{ env.BUILD_NUMBER }}
          name: 📱 Vartagram for Sideloadly v${{ env.APP_VERSION }} (Build ${{ env.BUILD_NUMBER }})
          body: |
            # 📱 Vartagram for Real iPhone/iPad
            
            **Version:** ${{ env.APP_VERSION }}  
            **Build Number:** ${{ env.BUILD_NUMBER }}  
            **Target:** iOS Device (arm64)
            
            ---
            
            ## ⚠️ Important Notes
            
            - ✅ Works on **REAL iPhone/iPad** devices
            - ✅ Use with **Sideloadly** or **AltStore**
            - ⚠️ Requires **free Apple ID** to sign
            - ⏱️ Valid for **7 days** (re-sign after expiry)
            - ❌ Does NOT work in Simulator
            
            ---
            
            ## 🔧 How to Install with Sideloadly
            
            ### 1️⃣ Download & Install Sideloadly
            - **Windows/Mac:** https://sideloadly.io/
            
            ### 2️⃣ Download IPA
            - Download `Vartagram-Sideloadly-*.ipa` from this release
            
            ### 3️⃣ Install on iPhone
            1. Connect iPhone to computer via USB
            2. Open Sideloadly
            3. Drag the IPA file into Sideloadly
            4. Enter your Apple ID (free account OK)
            5. Click "Start" and wait
            
            ### 4️⃣ Trust Certificate on iPhone
            1. Go to **Settings → General → VPN & Device Management**
            2. Tap your Apple ID
            3. Tap "Trust"
            
            ### 5️⃣ Done! 🎉
            Open Vartagram on your iPhone!
            
            ---
            
            ## 🔄 Re-signing After 7 Days
            
            Apps signed with free Apple ID expire after 7 days. To continue using:
            1. Re-run Sideloadly with the same IPA
            2. Or use **AltStore** with automatic refresh
            
            ---
            
            ## 📦 Files in This Release
            
            - `Vartagram-Sideloadly-${{ env.BUILD_NUMBER }}.ipa` - IPA for real devices
            
            ---
            
            ## ❓ Need Help?
            
            - Sideloadly not working? Check USB connection and Apple ID
            - Certificate not trusted? Go to iPhone Settings
            - Still issues? Open an issue on GitHub
            
          draft: false
          prerelease: true
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Vartagram-Sideloadly-${{ env.BUILD_NUMBER }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
