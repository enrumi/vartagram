name: Dev Build (Unsigned/7-day)

on:
  workflow_dispatch:
  push:
    branches: [ master, fix_build ]

env:
  BAZEL_USER_ROOT: "/private/var/tmp/_bazel_containerhost"

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Bazel cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BAZEL_USER_ROOT }}
          key: ${{ runner.os }}-bazel-dev-cache

      - name: Build the App (Development/Unsigned)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$((COMMIT_COUNT+BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          # Use example configuration with dummy profiles
          rm -rf $HOME/telegram-configuration
          mkdir -p $HOME/telegram-configuration
          
          # Use test-release config as base
          cp build-system/test-release-configuration.json $HOME/telegram-configuration/dev-config.json
          
          # Override API credentials if provided
          if [ ! -z "$API_ID" ]; then
            sed -i '' "s/\"api_id\": \"[^\"]*\"/\"api_id\": \"$API_ID\"/g" $HOME/telegram-configuration/dev-config.json
          fi
          if [ ! -z "$API_HASH" ]; then
            sed -i '' "s/\"api_hash\": \"[^\"]*\"/\"api_hash\": \"$API_HASH\"/g" $HOME/telegram-configuration/dev-config.json
          fi

          # Copy example provisioning profiles (dummy for development)
          cp -R build-system/example-configuration/provisioning $HOME/telegram-configuration/

          # Build for simulator (no code signing needed)
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="$HOME/telegram-configuration/dev-config.json" \
            --codesigningInformationPath="$HOME/telegram-configuration/provisioning" \
            --buildNumber=$BUILD_NUMBER \
            --configuration=release_sim_arm64

          echo "? Build completed successfully!"

          # Collect artifacts
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          
          # Find and copy the .app
          find bazel-bin/Telegram -name "Telegram.app" -type d -exec cp -R {} $OUTPUT_PATH/ \;
          
          # Create IPA (zip the .app)
          cd $OUTPUT_PATH
          if [ -d "Telegram.app" ]; then
            mkdir -p Payload
            cp -R Telegram.app Payload/
            zip -r Vartagram-Dev-${BUILD_NUMBER}.ipa Payload
            rm -rf Payload
            echo "? IPA created: Vartagram-Dev-${BUILD_NUMBER}.ipa"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-Dev-Build-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/
          retention-days: 7

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-build-${{ env.BUILD_NUMBER }}
          name: Vartagram Dev Build ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            ?? **Vartagram Development Build**
            
            **Version:** ${{ env.APP_VERSION }}
            **Build Number:** ${{ env.BUILD_NUMBER }}
            **Configuration:** Simulator (Unsigned)
            
            ?? **Important:**
            - This is a SIMULATOR build only
            - Does NOT work on real devices
            - Requires Xcode and iOS Simulator on Mac
            
            ?? **Files:**
            - `Vartagram-Dev-*.ipa` - IPA for simulator
            - `Telegram.app` - Raw .app bundle
            
            ?? **Installation:**
            1. Unzip the IPA
            2. Drag Telegram.app to iOS Simulator
            3. Or use: `xcrun simctl install booted Telegram.app`
          draft: false
          prerelease: true
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Vartagram-Dev-${{ env.BUILD_NUMBER }}.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
