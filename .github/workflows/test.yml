name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            /private/var/tmp/_bazel_runner
          key: ${{ runner.os }}-bazel-arm64-v2-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-arm64-v2-

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      - name: Set Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml ninja --break-system-packages

      - name: Install Bazelisk binary
        run: |
          curl -LO https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-darwin-arm64
          chmod +x bazelisk-darwin-arm64
          sudo mv bazelisk-darwin-arm64 /usr/local/bin/bazel
          bazel version

      - name: Create minimal unsigned config
        run: |
          cat > build-system/Make/minimal-unsigned-config.json << 'EOF'
          {
            "api_id": "2040",
            "api_hash": "b18441a1ff607e10a989891a5462e627",
            "app_center_id": "",
            "is_internal_build": false,
            "is_appstore_build": false,
            "app_specific_url_scheme": "tgapp",
            "team_id": "C67CF9S4VU",
            "bundle_id": "ph.telegra.Telegraph",
            "appstore_id": "0",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false,
            "enable_watch": false,
            "is_non_dev_account": false
          }
          EOF
          echo "✅ Created minimal-unsigned-config.json with matching bundle_id and team_id"

      - name: Setup Fake Signing Identity (PROPER WAY!)
        run: |
          # 1. Create new keychain
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 2. Generate self-signed certificate
          # IMPORTANT: Name must match what we specify in Bazel
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/cert.pem -days 365 -nodes \
            -subj "/CN=Apple Development: Fake (C67CF9S4VU)"

          # 3. Package as P12 and import to Keychain
          openssl pkcs12 -export -out /tmp/certificate.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -password pass:12345
          security import /tmp/certificate.p12 -k build.keychain -P 12345 -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # 4. Verify Identity is visible
          security find-identity -v -p codesigning build.keychain
          
          echo "✅ Created and imported fake signing identity"
          
          # 5. Generate provisioning profiles linked to THIS certificate
          # First, remove old profiles
          rm -rf build-system/fake-codesigning/profiles
          mkdir -p build-system/fake-codesigning/profiles
          
          PROFILES=("Telegram" "Share" "NotificationContent" "NotificationService" "Widget" "Intents" "BroadcastUpload")
          for profile in "${PROFILES[@]}"; do
            python3 build-system/Make/generate_fake_profile.py \
              /tmp/cert.pem \
              "C67CF9S4VU" \
              "ph.telegra.Telegraph" \
              "build-system/fake-codesigning/profiles/${profile}.mobileprovision" \
              "$profile"
          done
          
          echo "✅ Generated 7 provisioning profiles linked to fake identity"
          ls -la build-system/fake-codesigning/profiles/

      - name: Clean build artifacts
        run: |
          rm -rf build/ bazel-* ~/Library/Developer/Xcode/DerivedData/ build-input/ Telegram/BUILD.bak
          
          # Clean any corrupted Bazel download
          if [ -f build-input/bazel-8.3.1-darwin-arm64 ]; then
            echo "Removing existing Bazel binary to force fresh download"
            rm -f build-input/bazel-8.3.1-darwin-arm64
          fi

      - name: Build IPA with fake codesigning (cert + profiles generated together)
        run: |
          python3 build-system/Make/Make.py build \
            --configurationPath=build-system/Make/minimal-unsigned-config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber=10000 \
            --outputBuildArtifactsPath=./build-output
          
          echo "✅ Built device IPA with linked cert+profiles - ready for Sideloadly/AltStore"

      - name: Check output
        if: always()
        run: |
          echo "=== build-output/ ==="
          ls -la build-output/ || echo "No build-output"
          echo "=== bazel-bin/Telegram/ ==="
          find bazel-bin/ -name "*.ipa" 2>/dev/null || echo "No IPA in bazel-bin"
          echo "=== bazel-bin/ ==="
          ls -la bazel-bin/ 2>/dev/null || echo "No bazel-bin"

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: |
            build-output/Telegram.ipa
            bazel-bin/Telegram/*.ipa
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            bazel-*/bazel-*.log
            build-input/
          retention-days: 7
