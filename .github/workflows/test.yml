name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            /private/var/tmp/_bazel_runner
          key: ${{ runner.os }}-bazel-arm64-v2-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-arm64-v2-

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      - name: Set Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml ninja --break-system-packages

      - name: Install Bazelisk binary
        run: |
          curl -LO https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-darwin-arm64
          chmod +x bazelisk-darwin-arm64
          sudo cp bazelisk-darwin-arm64 /usr/local/bin/bazelisk
          sudo mv bazelisk-darwin-arm64 /usr/local/bin/bazel
          bazelisk version
          bazel version

      - name: Create minimal unsigned config
        run: |
          cat > build-system/Make/minimal-unsigned-config.json << 'EOF'
          {
            "api_id": "2040",
            "api_hash": "b18441a1ff607e10a989891a5462e627",
            "app_center_id": "",
            "is_internal_build": false,
            "is_appstore_build": false,
            "app_specific_url_scheme": "tgapp",
            "team_id": "C67CF9S4VU",
            "bundle_id": "ph.telegra.Telegraph",
            "appstore_id": "0",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false,
            "enable_watch": false,
            "is_non_dev_account": false
          }
          EOF
          echo "✅ Created minimal-unsigned-config.json with matching bundle_id and team_id"

      - name: Setup Fake Signing Identity (PROPER WAY - WITH FINGERPRINT MATCH!)
        run: |
          KEYCHAIN_PASSWORD="temp123"
          CERT_PASSWORD="cert123"
          
          # 1. Create keychain with password
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -d user -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 2. Create OpenSSL config with Code Signing extension
          cat > /tmp/cert.conf << 'EOF'
          [ req ]
          default_bits = 2048
          distinguished_name = req_distinguished_name
          x509_extensions = v3_ca
          
          [ req_distinguished_name ]
          
          [ v3_ca ]
          basicConstraints = critical,CA:FALSE
          keyUsage = critical,digitalSignature
          extendedKeyUsage = critical,codeSigning
          subjectKeyIdentifier = hash
          EOF
          
          # Generate self-signed certificate WITH code signing extension
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 365 -nodes \
            -subj "/C=US/ST=State/L=City/O=Fake Org/CN=Apple Development: Fake (C67CF9S4VU)" \
            -config /tmp/cert.conf -extensions v3_ca

          # 3. Export to P12 with matching name
          openssl pkcs12 -export -in /tmp/cert.pem -inkey /tmp/key.pem \
            -out /tmp/certificate.p12 \
            -name "Apple Development: Fake (C67CF9S4VU)" \
            -passout pass:"$CERT_PASSWORD"

          # 4. Import to keychain WITH CRITICAL FLAGS
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign

          # 5. CRITICAL: Set partition list for codesign access to private key
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" \
            -D "Apple Development: Fake (C67CF9S4VU)" \
            -t private build.keychain

          # 6. Verify identity is accessible
          echo "=== Identity in keychain ==="
          security find-identity -v -p codesigning build.keychain
          
          # 7. Extract DER from THE SAME P12 for mobileprovision
          # This ensures SHA-1 fingerprint match!
          openssl pkcs12 -in /tmp/certificate.p12 -clcerts -nokeys \
            -passin pass:"$CERT_PASSWORD" | \
            openssl x509 -outform DER -out /tmp/cert.der
          
          echo "✅ Created signing identity with matching fingerprint"
          
          # 8. Generate provisioning profiles with DER from P12
          rm -rf build-system/fake-codesigning/profiles
          mkdir -p build-system/fake-codesigning/profiles
          
          PROFILES=("Telegram" "Share" "NotificationContent" "NotificationService" "Widget" "Intents" "BroadcastUpload")
          for profile in "${PROFILES[@]}"; do
            python3 build-system/Make/generate_fake_profile.py \
              /tmp/cert.der \
              /tmp/key.pem \
              "C67CF9S4VU" \
              "ph.telegra.Telegraph" \
              "build-system/fake-codesigning/profiles/${profile}.mobileprovision" \
              "$profile"
          done
          
          echo "✅ Generated profiles with EXACT cert from keychain"
          
          # 9. Verify SHA-1 fingerprints match
          KEYCHAIN_SHA1=$(security find-certificate -c "Apple Development: Fake" -p build.keychain | openssl x509 -noout -fingerprint -sha1 | cut -d'=' -f2)
          PROFILE_SHA1=$(openssl x509 -inform DER -in /tmp/cert.der -noout -fingerprint -sha1 | cut -d'=' -f2)
          echo "Keychain SHA-1: $KEYCHAIN_SHA1"
          echo "Profile SHA-1:  $PROFILE_SHA1"
          [ "$KEYCHAIN_SHA1" = "$PROFILE_SHA1" ] && echo "✅ Fingerprints MATCH!" || echo "❌ Fingerprints MISMATCH!"

      - name: Clean build artifacts
        run: |
          rm -rf build/ bazel-* ~/Library/Developer/Xcode/DerivedData/ build-input/ Telegram/BUILD.bak
          
          # Clean any corrupted Bazel download
          if [ -f build-input/bazel-8.3.1-darwin-arm64 ]; then
            echo "Removing existing Bazel binary to force fresh download"
            rm -f build-input/bazel-8.3.1-darwin-arm64
          fi

      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py generateProject \
            --configurationPath=build-system/Make/minimal-unsigned-config.json \
            --disableProvisioningProfiles
      - name: Force device architecture in Bazel scripts
        run: |
          echo "=== Patching Bazel build settings to force ios_arm64 ==="
          
          # After project generation, force ios_arm64 in bazel_build_settings.py
          BAZEL_SCRIPT="Telegram/Telegram.xcodeproj/.tulsi/Scripts/bazel_build_settings.py"
          
          if [ -f "$BAZEL_SCRIPT" ]; then
            # Replace any ios_sim_arm64 with ios_arm64
            sed -i '' 's/ios_sim_arm64/ios_arm64/g' "$BAZEL_SCRIPT"
            echo "? Forced ios_arm64 in bazel_build_settings.py"
            
            # Verify the change
            grep -n "ios_arm64" "$BAZEL_SCRIPT" || echo "?? Pattern not found"
          else
            echo "?? Bazel script not found at $BAZEL_SCRIPT"
          fi
          
          echo "✅ Generated Xcode project"

      - name: Patch Xcode build scripts to handle missing swiftmodule files
        run: |
          # Create a script to handle swiftmodule copying with error handling
          cat > /tmp/copy_swiftmodule_safe.sh << 'EOFSCRIPT'
          #!/bin/bash
          # Safe copy that creates empty files if source doesn't exist
          SOURCE="$1"
          DEST="$2"
          
          if [ -f "$SOURCE" ]; then
            mkdir -p "$(dirname "$DEST")"
            cp "$SOURCE" "$DEST"
          else
            echo "Warning: Source file not found: $SOURCE"
            echo "Creating empty placeholder at: $DEST"
            mkdir -p "$(dirname "$DEST")"
            touch "$DEST"
          fi
          EOFSCRIPT
          
          chmod +x /tmp/copy_swiftmodule_safe.sh
          echo "✅ Created safe copy script for swiftmodule files"


      - name: Final force of ios_arm64 architecture
        run: |
          echo "=== Final patch: Force ios_arm64 in all Bazel scripts ==="
          
          # Patch all bazel_build_settings.py files
          find build-input -name 'bazel_build_settings.py' -type f | while read file; do
            echo "Patching: $file"
            sed -i '' 's/ios_sim_arm64/ios_arm64/g' "$file"
            sed -i '' "s/'--cpu=ios_sim_arm64'/'--cpu=ios_arm64'/g" "$file"
            echo "? Patched $file"
          done
          
          
          # Also patch in build-xcode if exists
          find build-xcode -name 'bazel_build_settings.py' -type f 2>/dev/null | while read file; do
            echo "Patching: $file"
            sed -i '' 's/ios_sim_arm64/ios_arm64/g' "$file"
            sed -i '' "s/'--cpu=ios_sim_arm64'/'--cpu=ios_arm64'/g" "$file"
            echo "? Patched $file"
          done || true
          
          # CRITICAL: Also patch in Telegram/ directory where Xcode project is
          find Telegram -name 'bazel_build_settings.py' -type f 2>/dev/null | while read file; do
            echo "Patching: $file"
            sed -i '' 's/ios_sim_arm64/ios_arm64/g' "$file"
            sed -i '' "s/'--cpu=ios_sim_arm64'/'--cpu=ios_arm64'/g" "$file"
            echo "? Patched $file"
          done || true
          
          # Show all found bazel_build_settings.py files
          echo "=== All bazel_build_settings.py files ==={{="
          find . -name 'bazel_build_settings.py' -type f 2>/dev/null || true

      - name: Build directly with Bazel for ios_arm64
        run: |
          echo "=== Attempting direct Xcode build for iOS device ==="
          echo "⚠️ Trying to bypass Bazel and build directly with xcodebuild"
          
          # Get build number from file or use default
          if [ -f "build_number_offset" ]; then
            BUILD_NUM=$(cat build_number_offset)
          else
            BUILD_NUM="1000"
          fi
          
          # Get version from versions.json
          if [ -f "versions.json" ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('versions.json'))['app'])")
            ORIGINAL_VERSION=$(python3 -c "import json; print(json.load(open('versions.json'))['app'])")
          else
            VERSION="1.0"
            ORIGINAL_VERSION="10.14.5"
          fi
          
          # Original build number (Telegram upstream)
          ORIGINAL_BUILD="2515"
          
          echo "Using build number: $BUILD_NUM"
          echo "Using Telegram version: $VERSION"
          echo "Using original version: $ORIGINAL_VERSION"
          echo "Using original build: $ORIGINAL_BUILD"
          
          echo "=== Building with Bazel directly (bypassing Xcode) ==="
          
          set +e  # Don't exit on error
          set -o pipefail
          
          # Build the Telegram.app target directly with Bazel
          # This respects our .bazelrc which has --cpu=ios_arm64
          bazelisk build \
            --compilation_mode=opt \
            --copt=-DNDEBUG \
            //Telegram:Telegram \
            2>&1 | tee build.log
          
          BAZEL_EXIT=$?
          echo "=== Bazel build exited with code: $BAZEL_EXIT ==="
          
          if [ -f build.log ]; then
            echo "=== Build log size: $(wc -l build.log | awk '{print $1}') lines ==="
          fi
          
          set -e
          
          echo "✅ Build attempt completed"
          
          # Show last 100 lines of build log to see errors
          echo "=== Last 100 lines of build log ==="
          tail -100 build.log || echo "No build log found"
          
          # Check what was built by Bazel
          echo "=== Searching for built .app in bazel-bin ==="
          find bazel-bin -name "Telegram.app" -type d 2>/dev/null || echo "No .app found in bazel-bin"
          
          # Show bazel-bin structure
          echo "=== bazel-bin/Telegram/ structure ==="
          ls -la bazel-bin/Telegram/ 2>/dev/null || echo "No bazel-bin/Telegram"
          
          # Look for ios_arm64 directories
          echo "=== Looking for ios_arm64 build output ==="
          find bazel-bin -type d -name "*ios_arm64*" 2>/dev/null | head -10 || echo "No ios_arm64 directories"

      - name: Package IPA from Bazel build
        run: |
          echo "=== Packaging IPA from Bazel output ==="
          
          # Look for .app in bazel-bin (Bazel output directory)
          APP_PATH=$(find bazel-bin -name "Telegram.app" -type d | grep -v ".appex" | head -1)
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ No Telegram.app found in bazel-bin!"
            echo "=== All .app files in bazel-bin: ==="
            find bazel-bin -name "*.app" -type d 2>/dev/null || echo "None"
            echo "=== All files in bazel-bin/Telegram: ==="
            ls -laR bazel-bin/Telegram/ 2>/dev/null | head -50 || echo "No bazel-bin/Telegram"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          
          # Check if it has binary
          if [ ! -f "$APP_PATH/Telegram" ]; then
            echo "❌ No Telegram binary in .app!"
            ls -la "$APP_PATH/"
            exit 1
          fi
          
          # Check architecture
          echo "=== Checking architecture ==="
          file "$APP_PATH/Telegram"
          lipo -info "$APP_PATH/Telegram" 2>/dev/null || echo "Not a fat binary"
          
          ARCH_CHECK=$(lipo -info "$APP_PATH/Telegram" 2>/dev/null | grep -o "arm64" || echo "")
          if [ -z "$ARCH_CHECK" ]; then
            echo "⚠️ WARNING: Not arm64 architecture!"
          else
            echo "✅ Correct arm64 device architecture!"
          fi
          
          # Get binary size
          BINARY_SIZE=$(stat -f%z "$APP_PATH/Telegram")
          echo "Binary size: $BINARY_SIZE bytes ($(($BINARY_SIZE / 1024 / 1024)) MB)"
          
          if [ "$BINARY_SIZE" -lt 10000000 ]; then
            echo "⚠️ WARNING: Binary smaller than 10MB - might be incomplete"
          fi
          
          # Create IPA
          mkdir -p build-output/Payload
          cp -r "$APP_PATH" build-output/Payload/
          cd build-output
          zip -qry Telegram-unsigned.ipa Payload/
          cd ..
          
          # Verify IPA
          ls -lh build-output/Telegram-unsigned.ipa
          echo "=== IPA Contents (first 30 files) ==="
          unzip -l build-output/Telegram-unsigned.ipa | head -30
          
          echo ""
          echo "✅ Created unsigned IPA for Sideloadly!"
          echo "📱 Ready to install on iPhone via Sideloadly"

      - name: Check output
        if: always()
        run: |
          echo "=== build-output/ ==="
          ls -la build-output/ || echo "No build-output"
          echo "=== bazel-bin/Telegram/ ==="
          find bazel-bin/ -name "*.ipa" 2>/dev/null || echo "No IPA in bazel-bin"
          echo "=== bazel-bin/ ==="
          ls -la bazel-bin/ 2>/dev/null || echo "No bazel-bin"

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: build-output/Telegram-unsigned.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            bazel-*/bazel-*.log
            build-input/
          retention-days: 7
