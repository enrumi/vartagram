name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:  # ручной запуск
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Чистим диск (macos-14 жрёт место)
      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      # Убираем PEP 668 (фикс 2025)
      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true
          echo "PEP 668 удалён"

      # Обновляем pip и ставим реальные deps (manual, без requirements.txt)
      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml ninja --break-system-packages
          echo "Deps готовы: protobuf, requests, colorama, pyyaml, ninja"

      # Ставим Node.js + npm (через официальный action, без хуйни)
      - name: Setup Node.js (для возможных инструментов, но не используем npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Ставим Bazelisk бинарником (без npm, 100% стабильно, как в официальном гайде Bazel)
      - name: Install Bazelisk binary
        run: |
          curl -L -o /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-darwin-arm64
          chmod +x /usr/local/bin/bazel
          bazel version
          echo "Bazelisk установлен"

      # Генерируем Xcode проект
      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --disableSwiftlint \
            --disableCodesigning \
            --xcodeManagedCodesigning

      # Билдим unsigned app
      - name: Build Vartagram unsigned
        run: |
          xcodebuild -project Vartagram.xcodeproj \
                     -scheme Vartagram \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     -quiet

      # Пакуем .ipa
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Vartagram.app Payload/
          zip -r9 Vartagram-unsigned.ipa Payload/
          echo "IPA готов:"
          ls -lh Vartagram-unsigned.ipa

      # Выкладываем артефакт
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: Vartagram-unsigned.ipa
          retention-days: 30

      - name: Success
        run: echo "Готово! Unsigned Vartagram.ipa в Artifacts. Ставь на iPhone через Sideloadly/TrollStore/Esign."