name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      - name: Set Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml ninja --break-system-packages

      - name: Install Bazelisk binary
        run: |
          curl -LO https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-darwin-arm64
          chmod +x bazelisk-darwin-arm64
          sudo mv bazelisk-darwin-arm64 /usr/local/bin/bazel
          bazel version

      - name: Fix BuildConfig BUILD file
        run: |
          sed -i '' 's/"-DAPP_CONFIG_IS_INTERNAL_BUILD={}".format(telegram_is_internal_build)/"-DAPP_CONFIG_IS_INTERNAL_BUILD={}".format("NO" if not telegram_is_internal_build else "YES")/g' submodules/BuildConfig/BUILD || true
          sed -i '' 's/"-DAPP_CONFIG_IS_APPSTORE_BUILD={}".format(telegram_is_appstore_build)/"-DAPP_CONFIG_IS_APPSTORE_BUILD={}".format("NO" if not telegram_is_appstore_build else "YES")/g' submodules/BuildConfig/BUILD || true

      - name: Create minimal unsigned config
        run: |
          cat > build-system/Make/minimal-unsigned-config.json << 'EOF'
          {
            "api_id": "2040",
            "api_hash": "b18441a1ff607e10a989891a5462e627",
            "app_center_id": "",
            "is_internal_build": false,
            "is_appstore_build": false,
            "app_specific_url_scheme": "tgapp",
            "team_id": "",
            "bundle_id": "org.telegram.messenger",
            "appstore_id": "0",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false,
            "enable_watch": false,
            "is_non_dev_account": true
          }
          EOF
          echo "✅ Created minimal-unsigned-config.json"

      - name: Patch Telegram/BUILD - disable all provisioning profiles
        run: |
          python3 << 'EOF'
          import re, pathlib
          
          path = pathlib.Path('Telegram/BUILD')
          if path.exists():
              content = path.read_text(encoding='utf-8')
              
              # Заменяем все provisioning_profile = ... на None
              content = re.sub(
                  r'provisioning_profile\s*=\s*select.*?None.*?mobileprovision',
                  'provisioning_profile = None',
                  content,
                  flags=re.DOTALL
              )
              
              # Убираем xcode_provisioning_profile полностью
              content = re.sub(r'xcode_provisioning_profile\s*\([^)]*\),?\s*\n?', '', content)
              
              path.write_text(content, encoding='utf-8')
              print("✅ Disabled all provisioning profiles in Telegram/BUILD")
          else:
              print("⚠️ Telegram/BUILD not found")
          EOF

      - name: Create empty codesigning path
        run: |
          mkdir -p build-system/empty-codesigning/profiles
          mkdir -p build-system/empty-codesigning/certs
          echo "✅ Empty codesigning structure created"

      - name: Clean build artifacts
        run: |
          rm -rf build/ bazel-* ~/Library/Developer/Xcode/DerivedData/ build-input/

      - name: Build unsigned IPA
        run: |
          python3 build-system/Make/Make.py build \
            --configurationPath=build-system/Make/minimal-unsigned-config.json \
            --codesigningInformationPath=build-system/empty-codesigning \
            --configuration=release_arm64 \
            --buildNumber=10000 \
            --outputBuildArtifactsPath=./build-output

      - name: Check & package output
        run: |
          echo "Checking build output..."
          ls -la build-output/ || mkdir -p build-output
          
          if [ -f "build-output/Telegram.ipa" ]; then
            echo "✅ IPA found!"
            ls -lh build-output/Telegram.ipa
          else
            echo "❌ IPA not found, searching bazel-bin:"
            find bazel-bin -name "*.ipa" -o -name "Telegram.ipa" 2>/dev/null || true
            ls -la bazel-bin/Telegram/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: build-output/Telegram.ipa
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload DSYMs (if any)
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-DSYMs-${{ github.sha }}
          path: build-output/Telegram.DSYMs.zip
          retention-days: 30
          if-no-files-found: ignore

      - name: Success message
        if: success()
        run: |
          echo "🎉 Build SUCCESS!"
          echo "📱 Unsigned IPA ready in Artifacts: Vartagram-unsigned-${{ github.sha }}"
          echo "💾 Download from Actions -> Artifacts"
