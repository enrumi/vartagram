name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:  # ручной запуск
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Чистим диск (macos-14 жрёт место как свинья)
      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      # Убираем PEP 668 (главный фикс 2025)
      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true
          echo "PEP 668 убран, pip свободен"

      # Обновляем pip и ставим реальные зависимости для Telegram/Vartagram (без requirements.txt)
      - name: Install Python deps (manual, как в README)
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml --break-system-packages
          echo "Зависимости установлены: protobuf, requests, colorama, pyyaml"

      # Bazelisk через npm (без brew, 100% стабильно)
      - name: Install Bazelisk
        run: |
          npm install -g @bazel/bazelisk
          bazelisk version  # тест

      # Ninja через pip (для быстрого компиля)
      - name: Install ninja
        run: |
          python3 -m pip install ninja --break-system-packages

      # Генерируем Xcode проект (как в README, с отключением лишнего)
      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --disableSwiftlint \
            --disableCodesigning \
            --xcodeManagedCodesigning

      # Билдим unsigned app (без архива, прямой билд в Release-iphoneos)
      - name: Build Vartagram unsigned
        run: |
          xcodebuild -project Vartagram.xcodeproj \
                     -scheme Vartagram \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     -quiet

      # Пакуем .ipa из билда
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Vartagram.app Payload/
          zip -r9 Vartagram-unsigned.ipa Payload/
          echo "IPA готов:"
          ls -lh Vartagram-unsigned.ipa

      # Выкладываем артефакт (держим 30 дней)
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: Vartagram-unsigned.ipa
          retention-days: 30

      - name: Success message
        run: echo "Готово! Твой unsigned Vartagram.ipa в Artifacts. Ставь через Sideloadly/TrollStore."
  