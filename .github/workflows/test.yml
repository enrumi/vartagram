name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Освобождаем место (обязательно, иначе падает)
      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /Applications/Xcode_16.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      # Python 3.11 и pip уже есть в образе macos-14, просто обновляем pip
      - name: Upgrade pip & install Python deps
        run: |
          python3.11 -m pip install --upgrade pip setuptools wheel
          python3.11 -m pip install -r build-system/requirements.txt --break-system-packages

      # Убираем PEP 668 (главная строчка 2025)
      - name: Disable PEP 668 (EXTERNALLY-MANAGED)
        run: |
          rm -f $(python3.11 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      # Bazelisk — ставим через npm (самый стабильный способ на macos-14 сейчас)
      - name: Install Bazelisk via npm
        run: |
          npm i -g @bazel/bazelisk

      # Ninja — ставим через pip (быстро и без brew)
      - name: Install ninja via pip
        run: |
          python3.11 -m pip install ninja

      # Генерируем проект
      - name: Generate Xcode project
        run: |
          python3.11 build-system/Make/Make.py generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --disableSwiftlint \
            --disableCodesigning

      # Билдим unsigned
      - name: Build Vartagram (unsigned)
        run: |
          xcodebuild -scheme Vartagram \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     -quiet archive

      # Пакуем .ipa
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/Vartagram.app Payload/
          zip -r9 Vartagram-unsigned.ipa Payload/
          ls -la Vartagram-unsigned.ipa

      # Загружаем артефакт
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: Vartagram-unsigned.ipa
          retention-days: 14