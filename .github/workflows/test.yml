name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          sudo rm -rf /opt/homebrew || true
          df -h

      - name: Set Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Disable PEP 668
        run: |
          rm -f $(python3 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages
          python3 -m pip install protobuf requests colorama pyyaml ninja --break-system-packages

      - name: Install Bazelisk binary
        run: |
          curl -LO https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-darwin-arm64
          chmod +x bazelisk-darwin-arm64
          sudo mv bazelisk-darwin-arm64 /usr/local/bin/bazel
          bazel version

      - name: Create minimal unsigned config
        run: |
          cat > build-system/Make/minimal-unsigned-config.json << 'EOF'
          {
            "api_id": "2040",
            "api_hash": "b18441a1ff607e10a989891a5462e627",
            "app_center_id": "",
            "is_internal_build": false,
            "is_appstore_build": false,
            "app_specific_url_scheme": "tgapp",
            "team_id": "DUMMY",
            "bundle_id": "org.telegram.messenger",
            "appstore_id": "0",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false,
            "enable_watch": false,
            "is_non_dev_account": true
          }
          EOF
          echo "✅ Created minimal-unsigned-config.json"

      - name: Create dummy certificate with code signing extensions and import to keychain
        run: |
          # Create config file for certificate with code signing extension
          cat > /tmp/cert.conf << 'EOF'
          [ req ]
          default_bits = 2048
          distinguished_name = req_distinguished_name
          req_extensions = v3_req
          x509_extensions = v3_ca
          
          [ req_distinguished_name ]
          
          [ v3_req ]
          basicConstraints = CA:FALSE
          keyUsage = critical,digitalSignature
          extendedKeyUsage = critical,codeSigning
          
          [ v3_ca ]
          basicConstraints = critical,CA:FALSE
          keyUsage = critical,digitalSignature
          extendedKeyUsage = critical,codeSigning
          subjectKeyIdentifier = hash
          EOF
          
          # Generate key and certificate with proper extensions
          openssl genrsa -out /tmp/dummy_key.pem 2048
          openssl req -new -x509 -key /tmp/dummy_key.pem -out /tmp/dummy_cert.pem -days 365 \
            -subj "/CN=Apple Development: Dummy User (DUMMY)/OU=DUMMY/O=Dummy Organization" \
            -config /tmp/cert.conf -extensions v3_ca
          
          # Convert to P12 format for keychain import
          openssl pkcs12 -export -out /tmp/dummy_cert.p12 -inkey /tmp/dummy_key.pem -in /tmp/dummy_cert.pem -passout pass:dummy
          
          # Create a temporary keychain
          security create-keychain -p dummy build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p dummy build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import the certificate
          security import /tmp/dummy_cert.p12 -k build.keychain -P dummy -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k dummy build.keychain
          
          # Verify it's there
          security find-identity -v -p codesigning build.keychain
          
          echo "✅ Dummy code signing certificate imported to keychain"

      - name: Create valid dummy codesigning profiles using the same certificate
        run: |
          mkdir -p build-system/empty-codesigning/profiles build-system/empty-codesigning/certs
          
          # Use Python to create profiles with the existing certificate
          python3 << 'EOFPYTHON'
          import sys
          import os
          import plistlib
          import datetime
          import subprocess
          import tempfile
          import re
          import base64
          
          def create_dummy_mobileprovision(name, team_id, bundle_id, output_path, cert_path, key_path):
              """Create a minimal valid .mobileprovision file"""
              
              name_to_suffix = {
                  'Telegram': '',
                  'Share': '.Share',
                  'NotificationContent': '.NotificationContent',
                  'NotificationService': '.NotificationService',
                  'Widget': '.Widget',
                  'Intents': '.SiriIntents',
                  'BroadcastUpload': '.BroadcastUpload',
              }
              
              suffix = name_to_suffix.get(name, '')
              app_id = f'{team_id}.{bundle_id}{suffix}'
              keychain_team = team_id
              
              profile_dict = {
                  'AppIDName': f'Vartagram {name}',
                  'ApplicationIdentifierPrefix': [team_id],
                  'CreationDate': datetime.datetime(2024, 1, 1, 0, 0, 0),
                  'Platform': ['iOS'],
                  'IsXcodeManaged': False,
                  'DeveloperCertificates': [],
                  'Entitlements': {
                      'application-identifier': app_id,
                      'keychain-access-groups': [keychain_team],
                      'com.apple.security.application-groups': [f'group.{bundle_id}'],
                      'get-task-allow': True,
                      'aps-environment': 'development'
                  },
                  'ExpirationDate': datetime.datetime(2099, 12, 31, 23, 59, 59),
                  'Name': f'Vartagram {name} Profile',
                  'ProvisionedDevices': [],
                  'TeamIdentifier': [team_id],
                  'TeamName': 'Vartagram Team',
                  'TimeToLive': 365,
                  'UUID': f'00000000-0000-0000-0000-{name.lower():0>12s}'[:36],
                  'Version': 1
              }
              
              # Read the certificate
              with open(cert_path, 'rb') as f:
                  cert_pem = f.read()
                  cert_b64 = re.search(b'-----BEGIN CERTIFICATE-----(.*?)-----END CERTIFICATE-----', cert_pem, re.DOTALL)
                  if cert_b64:
                      cert_data = base64.b64decode(cert_b64.group(1))
                      profile_dict['DeveloperCertificates'] = [cert_data]
              
              plist_data = plistlib.dumps(profile_dict, fmt=plistlib.FMT_XML)
              
              temp_plist = os.path.join(tempfile.gettempdir(), 'temp_profile.plist')
              with open(temp_plist, 'wb') as f:
                  f.write(plist_data)
              
              try:
                  subprocess.run([
                      'openssl', 'smime', '-sign',
                      '-in', temp_plist,
                      '-out', output_path,
                      '-outform', 'der',
                      '-signer', cert_path,
                      '-inkey', key_path,
                      '-nodetach'
                  ], capture_output=True, check=True)
                  print(f'Created: {output_path}')
              finally:
                  if os.path.exists(temp_plist):
                      os.remove(temp_plist)
          
          team_id = "DUMMY"
          bundle_id = "org.telegram.messenger"
          output_dir = "build-system/empty-codesigning/profiles"
          cert_path = "/tmp/dummy_cert.pem"
          key_path = "/tmp/dummy_key.pem"
          
          profiles = ['Telegram', 'Share', 'NotificationContent', 'NotificationService', 'Widget', 'Intents', 'BroadcastUpload']
          
          for profile_name in profiles:
              output_path = os.path.join(output_dir, f'{profile_name}.mobileprovision')
              create_dummy_mobileprovision(profile_name, team_id, bundle_id, output_path, cert_path, key_path)
          
          print(f'✅ Created {len(profiles)} profiles with matching certificate')
          EOFPYTHON
          
          echo "✅ Valid dummy codesigning profiles created with matching certificate"

      - name: Clean build artifacts
        run: |
          rm -rf build/ bazel-* ~/Library/Developer/Xcode/DerivedData/ build-input/ Telegram/BUILD.bak

      - name: Build unsigned IPA (simulator build for re-signing)
        run: |
          python3 build-system/Make/Make.py build \
            --configurationPath=build-system/Make/minimal-unsigned-config.json \
            --codesigningInformationPath=build-system/empty-codesigning \
            --configuration=release_sim_arm64 \
            --buildNumber=10000 \
            --outputBuildArtifactsPath=./build-output \
            --disableProvisioningProfiles
          
          echo "✅ Built simulator IPA - can be re-signed for device using Sideloadly/AltStore"

      - name: Check output
        if: always()
        run: |
          echo "=== build-output/ ==="
          ls -la build-output/ || echo "No build-output"
          echo "=== bazel-bin/Telegram/ ==="
          find bazel-bin/ -name "*.ipa" 2>/dev/null || echo "No IPA in bazel-bin"
          echo "=== bazel-bin/ ==="
          ls -la bazel-bin/ 2>/dev/null || echo "No bazel-bin"

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: |
            build-output/Telegram.ipa
            bazel-bin/Telegram/*.ipa
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            bazel-*/bazel-*.log
            build-input/
          retention-days: 7
