name: Build Vartagram Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout repository + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Иногда runner загажен — чистим место
      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode_15.app || true
          df -h

      # Переходим в корень репо (ОБЯЗАТЕЛЬНО, иначе не найдёт build-system/)
      - name: Go to repository root
        run: cd $GITHUB_WORKSPACE

      # Убираем PEP 668
      - name: Disable PEP 668
        run: |
          rm -f $(python3.11 -c 'import sysconfig, pathlib; print(pathlib.Path(sysconfig.get_path("stdlib")) / "EXTERNALLY-MANAGED")') || true

      # Обновляем pip и ставим requirements (теперь точно найдёт файл)
      - name: Install Python dependencies
        run: |
          python3.11 -m pip install --upgrade pip setuptools wheel
          python3.11 -m pip install -r build-system/requirements.txt --break-system-packages

      # Bazelisk через npm (самый надёжный способ без brew)
      - name: Install Bazelisk
        run: npm i -g @bazel/bazelisk

      # Ninja через pip
      - name: Install ninja
        run: python3.11 -m pip install ninja

      # Генерируем проект
      - name: Generate Xcode project
        run: |
          python3.11 build-system/Make/Make.py generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --disableSwiftlint \
            --disableCodesigning

      # Билдим приложение (unsigned)
      - name: Build app
        run: |
          xcodebuild -scheme Vartagram \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     -quiet \
                     archive

      # Пакуем .ipa
      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/Vartagram.app Payload/
          zip -r9 Vartagram-unsigned.ipa Payload/
          echo "IPA size:"
          ls -lh Vartagram-unsigned.ipa

      # Выкладываем артефакт
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vartagram-unsigned-${{ github.sha }}
          path: Vartagram-unsigned.ipa
          retention-days: 30